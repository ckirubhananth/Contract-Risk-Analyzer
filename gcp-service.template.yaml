apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: contract-risk-analyzer
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    spec:
      containers:
      - name: frontend
        image: REGION-docker.pkg.dev/PROJECT_ID/contract-risk-analyzer/frontend:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
      - name: backend
        image: REGION-docker.pkg.dev/PROJECT_ID/contract-risk-analyzer/backend:latest
        env:
        - name: GEMINI_API_KEY
          value: "GEMINI_API_KEY_PLACEHOLDER"
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
